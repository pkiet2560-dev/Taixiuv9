<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Casino Mobile</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body onload="showWelcome()">

    <nav class="navbar">
        <div class="nav-item" onclick="showTroll()">NẠP TIỀN</div>
        <div class="nav-item" onclick="showTroll()">RÚT TIỀN</div>
        <div class="nav-item" onclick="showCodeInput()">MÃ KM</div>
        <div class="nav-item" onclick="saveGame()" style="color: #f1c40f;">LƯU</div>
    </nav>

    <div class="balance-card">
         <span id="money">1,000,000</span> VND
    </div>

    <div class="game-card">
        <div id="predictionBoard">ADMIN DỰ BÁO: <span id="hint">---</span></div>
        
        <div class="dice-row">
            <div class="dice" id="d1">?</div>
            <div class="dice" id="d2">?</div>
            <div class="dice" id="d3">?</div>
        </div>

        <p class="total-info">Tổng điểm: <span id="totalPoints">0</span></p>
        
        <input type="number" id="bet" placeholder="Nhập tiền cược..." inputmode="numeric">
        
        <div class="btn-group">
            <button class="btn-play btn-odd" onclick="play('ODD')">LẺ</button>
            <button class="btn-play btn-even" onclick="play('EVEN')">CHẴN</button>
        </div>
        <p id="msg"></p>
    </div>

    <div class="history-section">
        <p>SOI CẦU (10 VÁN GẦN NHẤT)</p>
        <div class="history-list" id="history"></div>
    </div>

    <div id="mainModal" class="modal">
        <div class="modal-box" id="modalBody"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
